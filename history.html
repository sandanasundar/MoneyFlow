<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyFlow - Transaction History</title>

    <link rel="stylesheet" href="css/style.css">

    <script defer src="js/app.js"></script>
    <script defer src="js/history.js"></script>
</head>
<body>

<header class="topbar">
    <div class="logo">
        <h1>MoneyFlow</h1>
    </div>
</header>

<nav class="navbar">
    <a href="index.html">Home</a>
    <a href="history.html" class="active">History</a>
    <a href="analytics.html">Analytics</a>
    <a href="savings.html">Savings</a>
    <a href="settings.html">Settings</a>
</nav>

<main class="container">

    <!-- Filters -->

    <section class="glass-card">

        <h2>Transaction History</h2>

        <div class="filters">

            <input
                type="text"
                id="searchInput"
                placeholder="Search notes, category, method..."
                aria-label="Search Transactions"
            >

            <select id="typeFilter">
                <option value="">All Types</option>
                <option value="Income">Income</option>
                <option value="Expense">Expense</option>
            </select>

            <select id="categoryFilter">
                <option value="">All Categories</option>
            </select>

            <select id="methodFilter">
                <option value="">All Methods</option>

                <option value="UPI">UPI</option>
                <option value="GPay">GPay</option>
                <option value="PhonePe">PhonePe</option>
                <option value="Paytm">Paytm</option>
                <option value="Amazon Pay">Amazon Pay</option>
                <option value="Cash">Cash</option>
                <option value="Bank Transfer">Bank Transfer</option>
                <option value="Debit Card">Debit Card</option>
                <option value="Credit Card">Credit Card</option>
                <option value="Other">Other</option>
            </select>

            <input
                type="month"
                id="monthFilter"
                aria-label="Month Filter"
            >

            <select id="sortSelect">
                <option value="newest">
                    Newest First
                </option>

                <option value="oldest">
                    Oldest First
                </option>

                <option value="amountDesc">
                    Highest Amount
                </option>

                <option value="amountAsc">
                    Lowest Amount
                </option>
            </select>

        </div>

    </section>

    <!-- Summary -->

    <section class="summary-grid">

        <div class="summary-card">
            <h3>Filtered Income</h3>
            <h2 id="filteredIncome">
                ₹0.00
            </h2>
        </div>

        <div class="summary-card expense">
            <h3>Filtered Expense</h3>
            <h2 id="filteredExpense">
                ₹0.00
            </h2>
        </div>

        <div class="summary-card">
            <h3>Transactions</h3>
            <h2 id="transactionCount">
                0
            </h2>
        </div>

    </section>

    <!-- Transactions Table -->

    <section class="glass-card">

        <div class="table-wrapper">

            <table>

                <thead>

                <tr>
                    <th>Date</th>
                    <th>Type</th>
                    <th>Category</th>
                    <th>Method</th>
                    <th>Amount</th>
                    <th>Note</th>
                    <th>Actions</th>
                </tr>

                </thead>

                <tbody id="historyTableBody">

                </tbody>

            </table>

        </div>

        <div id="emptyHistory"
             class="empty-state hidden">

            No transactions found.

        </div>

        <div id="pagination"
             class="pagination">

        </div>

    </section>

</main>

<!-- Edit Modal -->

<div id="editModal"
     class="modal hidden">

    <div class="modal-content">

        <h3>Edit Transaction</h3>

        <form id="editForm">

            <input type="hidden"
                   id="editId">

            <div class="form-group">
                <label>Date</label>
                <input type="date"
                       id="editDate"
                       required>
            </div>

            <div class="form-group">
                <label>Type</label>

                <select id="editType"
                        required>
                    <option value="Income">Income</option>
                    <option value="Expense">Expense</option>
                </select>
            </div>

            <div class="form-group">
                <label>Amount (₹)</label>

                <input type="number"
                       id="editAmount"
                       step="0.01"
                       min="0.01"
                       required>
            </div>

            <div class="form-group">
                <label>Category</label>

                <select id="editCategory"
                        required>
                </select>
            </div>

            <div class="form-group">
                <label>Method</label>

                <select id="editMethod"
                        required>

                    <option value="UPI">UPI</option>
                    <option value="GPay">GPay</option>
                    <option value="PhonePe">PhonePe</option>
                    <option value="Paytm">Paytm</option>
                    <option value="Amazon Pay">Amazon Pay</option>
                    <option value="Cash">Cash</option>
                    <option value="Bank Transfer">Bank Transfer</option>
                    <option value="Debit Card">Debit Card</option>
                    <option value="Credit Card">Credit Card</option>
                    <option value="Other">Other</option>

                </select>
            </div>

            <div class="form-group">
                <label>Note</label>

                <textarea id="editNote"
                          rows="3">
                </textarea>
            </div>

            <div class="modal-actions">

                <button type="button"
                        id="closeEditModal"
                        class="secondary-btn">
                    Cancel
                </button>

                <button type="submit"
                        class="primary-btn">
                    Save Changes
                </button>

            </div>

        </form>

    </div>

</div>

<!-- Delete Modal -->

<div id="deleteModal"
     class="modal hidden">

    <div class="modal-content">

        <h3>Delete Transaction</h3>

        <p>
            Are you sure you want to delete
            this transaction?
        </p>

        <div class="modal-actions">

            <button id="cancelDelete"
                    class="secondary-btn">
                Cancel
            </button>

            <button id="confirmDelete"
                    class="danger-btn">
                Delete
            </button>

        </div>

    </div>

</div>

</body>
</html>
